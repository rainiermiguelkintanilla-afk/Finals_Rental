# Railway — Symfony (https://docs.railway.com/guides/symfony)
[build]
builder = "RAILPACK"

[deploy]
preDeployCommand = "php bin/console lexik:jwt:generate-keypair --skip-if-exists && php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration && php bin/console asset-map:compile --env=prod && php bin/console app:create-admin-user rainiermiguelkintanilla@gmail.com -p sazsad || true"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
